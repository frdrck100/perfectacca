<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect 3 Accumulator P3A</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Basic reset */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }

  body {
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(90deg, #6200EE, #3700B3);
    color: white;
  }

  header h1 { font-size: 36px; margin-bottom: 10px; }
  header p { font-size: 20px; }

  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 30px 20px;
  }

  .box {
    width: 90%;
    max-width: 400px;
    padding: 30px;
    border-radius: 20px;
    color: white;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  .tips { background: #4CAF50; }
  .feedback { background: #FF9800; }

  .box:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }

  footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    color: #666;
  }

  a {
    text-decoration: none;
    color: inherit;
  }
</style>
</head>
<body>
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="free-tips.html">Free Tips</a></li>
    <li><a href="yesterday-tips.html">Previous Tips</a></li>
    <li><a href="today-tips.html">Today Tips</a></li>
    <li><a href="feedback.html">Feedback</a></li>
  </ul>
</nav>

<header>
  <h1>Perfect 3 Accumulator</h1>
  <p>P3A - Football Predicting App</p>
</header>

<div class="container">
  <a href="football-tips.html"><div class="box tips">⚽ Football Tips</div></a>
  <a href="feedback.html"><div class="box feedback">📝 Rate our Performance & Give Testimonies</div></a>
</div>

<footer>
  &copy; 2026 Perfect 3 Accumulator P3A. All Rights Reserved.
</footer>

<script>
  // Show nav on scroll for mobile
  window.addEventListener('scroll', function() {
    const nav = document.querySelector('nav');
    if (window.innerWidth <= 768) {
      if (window.scrollY > 100) {
        nav.classList.add('show');
      } else {
        nav.classList.remove('show');
      }
    }
  });
</script>

</body>
</html>
