<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfect 3 Accumulator P3A</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
<style>
  /* Basic reset */
  @import url('https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Titillium Web', sans-serif; }

  body {
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 40px 20px;
    background: linear-gradient(90deg, #6200EE, #3700B3);
    color: white;
  }

  header h1 { font-size: 32px; margin-bottom: 10px; }
  header p { font-size: 18px; }

  .ad-space {
    width: 100%;
    background-color: #e0e0e0;
    border: 2px dashed #999;
    padding: 20px;
    text-align: center;
    margin: 20px 0;
    border-radius: 8px;
    color: #666;
    font-size: 16px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    padding: 30px 20px;
  }

  .box {
    width: 90%;
    max-width: 400px;
    padding: 30px;
    border-radius: 20px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  .tips { background: #4CAF50; }
  .feedback { background: #FF9800; }

  .box:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  }

  footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    color: #666;
  }

  a {
    text-decoration: none;
    color: inherit;
  }
</style>
</head>
<body>
<div class="floating-ball ball-top-left"></div>
<div class="floating-ball ball-top-right"></div>
<div class="floating-ball ball-bottom-left"></div>
<div class="floating-ball ball-bottom-right"></div>
<nav>
  <button id="themeToggle" class="theme-toggle" title="Toggle Dark Mode">🌙</button>
  <div style="flex: 1;"></div>
</nav>

<a class="fixed-feedback" href="feedback.html">Feedback</a>
<button id="topButton" class="hidden" title="Back to top">↑</button>

<header>
  <h1>Perfect 3 Accumulator</h1>
  <p>P3A - Football Predicting App</p>
</header>

<div class="container">
  <div class="ad-space" style="width: 90%; max-width: 728px; height: 90px; margin-bottom: 30px;">📢 Advertisement Space</div>
  <a href="football-tips.html"><div class="box tips">⚽ Football Tips</div></a>
  <a href="testimonial.html"><div class="box feedback">💬 Testimonials</div></a>
  <a href="feedback.html"><div class="box feedback">📝 Rate our Performance & Give Testimonies</div></a>
  <div class="ad-space" style="width: 90%; max-width: 728px; height: 90px; margin-top: 30px;">📢 Advertisement Space</div>
</div>

<footer>
  &copy; 2026 Perfect 3 Accumulator P3A. All Rights Reserved.
</footer>

<script src="script.js"></script>
</body>
</html>
