<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - P3A</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<button id="topButton" class="hidden" title="Back to top">↑</button>

<header>
  <h1>Rate our Performance</h1>
  <p><a href="index.html" class="back-link">← Back to Home</a></p>
</header>

<div class="container">
  <div class="feedback-form">
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Your Feedback"></textarea>
    <button>Submit Feedback</button>
  </div>
</div>

<footer>
  &copy; 2026 Perfect 3 Accumulator P3A. All Rights Reserved.
</footer>

<script>
  const topButton = document.getElementById('topButton');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 200) {
      topButton.classList.remove('hidden');
    } else {
      topButton.classList.add('hidden');
    }
  });
  topButton.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
</script>
</html>
