<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback - P3A</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
<style>
  .ad-space {
    width: 100%;
    background-color: #e0e0e0;
    border: 2px dashed #999;
    padding: 20px;
    text-align: center;
    margin: 20px 0;
    border-radius: 8px;
    color: #666;
    font-size: 16px;
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<nav>
  <button id="themeToggle" class="theme-toggle" title="Toggle Dark Mode">🌙</button>
  <div style="flex: 1;"></div>
</nav>

<button id="topButton" class="hidden" title="Back to top">↑</button>

<header>
  <h1>Rate our Performance</h1>
  <p><a href="index.html" class="back-link">← Back to Home</a></p>
</header>

<div class="container">
  <div class="ad-space" style="width: 90%; max-width: 728px; height: 90px; margin-bottom: 30px;">📢 Advertisement Space</div>
  <form class="feedback-form" id="feedbackForm">
    <input type="text" id="feedbackName" placeholder="Your Name" required>
    <input type="email" id="feedbackEmail" placeholder="Email" required>
    <textarea id="feedbackMessage" placeholder="Your Feedback" required></textarea>
    <button type="submit">Submit Feedback</button>
  </form>
  <div class="ad-space" style="width: 90%; max-width: 728px; height: 90px; margin-top: 30px;">📢 Advertisement Space</div>
</div>

<footer>
  &copy; 2026 Perfect 3 Accumulator P3A. All Rights Reserved.
</footer>

<script src="script.js"></script>
</body>
</html>
