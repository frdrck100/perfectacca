<body>

<script>
  // Show nav on scroll for mobile
  window.addEventListener('scroll', function() {
    const nav = document.querySelector('nav');
    if (window.innerWidth <= 768) {
      if (window.scrollY > 100) {
        nav.classList.add('show');
      } else {
        nav.classList.remove('show');
      }
    }
  });
</script>
